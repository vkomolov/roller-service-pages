@@if (data && page && data[page].header) {

@@if (typeof innerSpan !== 'undefined' && innerSpan) {
<a href="@@data.@@page.header.contacts-block.viber"
   target="_blank"
   aria-label="@@data.@@page.header.contacts-block.viber_label"
   class="icon-link icon-link--with-span"
   tabindex="0">
	<div class="icon-link__social-icon">
		<svg viewBox="0 0 48 48">
			<title>viber icon</title>
			<use xlink:href="/assets/img/svgIcons/sprite.multi.svg#viber"></use>
		</svg>
	</div>
	<span class="icon-link__text icon-link__text--phone">@@innerSpan</span>
</a>
}

@@if (typeof innerSpan === 'undefined' || !innerSpan) {
<a href="@@data.@@page.header.contacts-block.viber"
   target="_blank"
   aria-label="@@data.@@page.header.contacts-block.viber_label"
   class="icon-link"
   tabindex="0">
	<div class="icon-link__social-icon">
		<svg viewBox="0 0 48 48">
			<title>viber icon</title>
			<use xlink:href="/assets/img/svgIcons/sprite.multi.svg#viber"></use>
		</svg>
	</div>
</a>
}

}
